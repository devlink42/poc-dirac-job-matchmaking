[workspace]
channels = ["conda-forge"]
name = "matchmaking"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[activation]
env = { PYTHONPATH = "." }

[tasks]
lint = "ruff check . && ruff format --check ."
format = "ruff format ."
test = "pytest --cov=src --cov-report=xml tests/ --cache-clear"
pre-commit = "pre-commit"
pc = "pre-commit run --all-files"
valid = "python src/core/valid_pilot.py"

[dependencies]
python = ">=3.11.3,<3.12"
pip = ">=25.1.1"
pixi-pycharm = ">=0.0.11,<0.0.12"
pydantic = ">=2.12.5,<3"
pyyaml = ">=6.0.3,<7"
pytest = ">=8.1.1"
ruff = ">=0.15.9,<0.16"
pytest-cov = ">=7.1.0,<8"
packaging = ">=26.0,<27"
pre-commit = ">=4.1.0,<5"

[feature.analysis.dependencies]
matplotlib = ">=3.9"
pandas = ">=2.2"
jupyterlab = ">=4.2"

[feature.analysis.tasks]
lab = "jupyter lab analysis/"

[environments]
analysis = { features = ["analysis"], solve-group = "analysis" }
