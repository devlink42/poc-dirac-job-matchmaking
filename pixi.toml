[workspace]
channels = ["conda-forge"]
name = "matchmaking"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
env = { PYTHONPATH = "." }

[tasks]

[dependencies]
python = ">=3.11.3,<3.12"
pip = ">=25.1.1"
pixi-pycharm = ">=0.0.11,<0.0.12"
pydantic = ">=2.12.5,<3"
pyyaml = ">=6.0.3,<7"
pytest = ">=8.1.1"

[feature.analysis.dependencies]
matplotlib = ">=3.9"
pandas = ">=2.2"
jupyterlab = ">=4.2"

[feature.analysis.tasks]
lab = "jupyter lab analysis/"

[environments]
analysis = { features = ["analysis"], solve-group = "analysis" }
