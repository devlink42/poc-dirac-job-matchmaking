# Job: MCSimulation job eligible for multiple sites
# Most MCSimulation jobs can run at many sites (site distribution is flat: top 20 sites all ~700K jobs)
# This uses multiple matching_specs to express multi-site eligibility
# Owner: lbprods / Group: lhcb_mc / Type: MCSimulation
# 3 days CPU time, accepts multiple x86_64 microarchitecture levels

owner: lbprods
group: lhcb_mc
job_type: MCSimulation
submission_time: "2026-03-28T09:30:00Z"

matching_specs:
