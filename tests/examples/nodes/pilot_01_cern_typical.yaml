# Pilot: Typical CERN worker node
# Should match the majority of jobs (MCSimulation, MCFastSimulation, User, etc.)
# x86_64 v4 (skylake+), 16 cores, 24 GB RAM, 3 days wall time
# Has cvmfs:lhcb, os:el9 tags

site: "LCG.CERN.cern"
system:
  name: Linux
  glibc: "2.28"
  user-namespaces: true
wall-time: 259200  # 3 days
cpu-work: 600000
cpu:
  num-nodes: 1
  num-cores: 16
  ram-mb: 24576  # 24 GB
  architecture:
    name: x86_64
    microarchitecture-level: 4
gpu:
  count: 0
tags:
  - cvmfs:lhcb
  - cvmfs:lhcbdev
  - os:el9
